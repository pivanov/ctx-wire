[filters.brew-install]
description = "Compact brew install/upgrade output - strip downloads, short-circuit when already installed"
match_command = "^brew\\s+(install|upgrade)\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^==> Downloading",
  "^==> Pouring",
  "^Already downloaded:",
  "^###",
  "^==> Fetching",
]
match_output = [
  { pattern = "already installed", message = "ok (already installed)" },
]
max_lines = 20

[[tests.brew-install]]
name = "already installed short-circuits"
input = """
Warning: wget 0.27.1 is already installed and up-to-date.
To reinstall 0.27.1, run:
  brew reinstall wget
"""
expected = "ok (already installed)"

[[tests.brew-install]]
name = "install strips download lines"
input = """
==> Fetching jq
==> Downloading https://homebrew.bintray.com/bottles/jq-1.7.1.arm64_sonoma.bottle.tar.gz
######################################################################## 100.0%
==> Pouring jq-1.7.1.arm64_sonoma.bottle.tar.gz
==> Summary
/opt/homebrew/Cellar/jq/1.7.1: 18 files, 1.2MB
"""
expected = "==> Summary\n/opt/homebrew/Cellar/jq/1.7.1: 18 files, 1.2MB"

[[tests.brew-install]]
name = "already installed output not collapsed when exit non-zero"
failed = true
input = """
Warning: jq 1.7.1 is already installed and up-to-date.
Error: Cannot install jq because conflicting formulae are installed:
  jq@1.6: because jq 1.6 and jq 1.7 cannot coexist
"""
expected = "Warning: jq 1.7.1 is already installed and up-to-date.\nError: Cannot install jq because conflicting formulae are installed:\n  jq@1.6: because jq 1.6 and jq 1.7 cannot coexist"
