[filters.jq]
description = "Compact jq output - cap raw text, pass complete JSON whole"
match_command = "^jq\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
]
# jq output is the agent's ANSWER, not noise. Complete JSON rides the runner's
# jsonGuard like every other filter (whole up to the passthrough limit, oversize
# becomes a marker + spool), never a mid-structure line cut. The caps below still
# apply to non-JSON `jq -r` raw text, which IsCompleteJSON excludes from
# jsonGuard. (No reduce_json: that opt-out is what line-cut the answer.)
max_lines = 40
truncate_lines_at = 120

[[tests.jq]]
name = "short output passes through"
input = """
{
  "name": "test",
  "version": "1.0"
}
"""
expected = "{\n  \"name\": \"test\",\n  \"version\": \"1.0\"\n}"

[[tests.jq]]
name = "empty input passes through"
input = ""
expected = ""
