[filters.eslint]
description = "Compact ESLint output"
match_command = "^(?:(?:{{runner}})?eslint\\b|(npm|pnpm|yarn)\\s+(run\\s+)?(eslint|lint)\\b)"
strip_ansi = true
match_output = [
  { pattern = "(?m)(0 problems|0 errors?[, ]+0 warnings?)", message = "eslint: ok" },
]
strip_lines_matching = ["^\\s*$"]
max_lines = 140
on_empty = "eslint: ok"

[[tests.eslint]]
name = "success collapses"
input = "✖ 0 problems (0 errors, 0 warnings)"
expected = "eslint: ok"

[[tests.eslint]]
name = "lint error preserved"
input = """
/src/app.ts
  4:3  error  Unexpected console statement  no-console
"""
expected = "/src/app.ts\n  4:3  error  Unexpected console statement  no-console"

[[tests.eslint]]
name = "npm run lint success collapses"
input = "✖ 0 problems (0 errors, 0 warnings)"
expected = "eslint: ok"

[[tests.eslint]]
name = "failed exit not collapsed when zero-problems line present"
failed = true
input = """
✖ 0 problems (0 errors, 0 warnings)
"""
expected = "✖ 0 problems (0 errors, 0 warnings)"
