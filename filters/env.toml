[filters.env]
description = "Compact env output: strip blanks, cap variables, truncate long values"
match_command = "^env(\\s+(-[0iSu]+|[A-Za-z_][A-Za-z0-9_]*=[^\\s]*))*\\s*$"
strip_ansi = true
strip_lines_matching = ["^\\s*$"]
truncate_lines_at = 220
max_lines = 120

[[tests.env]]
name = "variables preserved"
input = "HOME=/Users/example\nPATH=/usr/bin:/bin"
expected = "HOME=/Users/example\nPATH=/usr/bin:/bin"
