name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Website + telemetry worker: typecheck/lint/build. Neither runs in any other
  # gate (deploys build without these checks), so regressions here previously
  # shipped unverified.
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Web check + build
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run check
          bun run build
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: telemetry-worker/package-lock.json
      - name: Worker typecheck + tests
        working-directory: telemetry-worker
        run: |
          npm ci
          npm run check
          npm test

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          check-latest: true
          cache: true
      - uses: extractions/setup-just@v2
      # fmt-check + vet + test + race + verify (filter conformance).
      - name: Validate
        run: just check
      # Hermetic end-to-end smoke suite.
      - name: Smoke
        run: just smoke
      # Reachable-CVE scan against the build's Go stdlib + module graph.
      - name: Vuln scan
        run: just vuln

  # Real-Windows coverage for the .cmd shim and the self-update replace path. The
  # full Go suite is not Windows-green yet (some runner tests exec sh/cat), so we
  # do a compile-only sweep across everything plus a targeted runtime set.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          check-latest: true
          cache: true
      # Build every package and test binary so Windows compile breakage (a
      # missing build tag, a bad syscall) fails CI; -run "^$" matches no test, so
      # nothing executes the Unix-tool-dependent suites.
      - name: Compile sweep
        run: |
          go build ./...
          go vet ./...
          go test -run "^$" ./...
      # Targeted runtime: the packages and tests this change actually exercises on
      # Windows (Toolhelp detection, live-process self-update swap, the shim gate,
      # the resolver, byte-exact passthrough, and the .cmd template). Explicit
      # -run patterns keep the Unix-tool-dependent tests in these packages out.
      - name: Test (targeted)
        run: |
          go test ./internal/agent/... ./internal/selfupdate/...
          go test -run "ResolveRealExe|WindowsShimTemplate" ./internal/shim/...
          go test -run "RunRaw" ./internal/runner/...
          go test -run "ShimDecide" ./cmd/ctx-wire/...
