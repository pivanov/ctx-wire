[filters.apt]
description = "Compact apt and apt-get output"
match_command = "^(sudo\\s+)?apt(-get)?\\s+(install|update|upgrade)\\b"
strip_ansi = true
match_output = [
  { pattern = "(?m)(Setting up|Fetched|0 upgraded|Reading package lists\\.\\.\\. Done)", message = "apt: ok", unless = "(?i)(error|failed|unable|held broken)" },
]
strip_lines_matching = [
  "^\\s*$",
  "^Hit:",
  "^Get:",
  "^Ign:",
  "^Fetched ",
  "^Reading package lists",
  "^Building dependency tree",
  "^Reading state information",
  "^Selecting previously unselected package",
  "^Preparing to unpack",
  "^Unpacking ",
]
max_lines = 100
on_empty = "apt: ok"

[[tests.apt]]
name = "install success collapses"
input = """
Reading package lists... Done
Building dependency tree... Done
Unpacking jq (1.6) ...
Setting up jq (1.6) ...
"""
expected = "apt: ok"

[[tests.apt]]
name = "error preserved"
input = "E: Unable to locate package nope"
expected = "E: Unable to locate package nope"

[[tests.apt]]
name = "dpkg configure failure not collapsed to apt: ok"
failed = true
input = """
Reading package lists... Done
Building dependency tree... Done
Reading state information... Done
Selecting previously unselected package curl.
Preparing to unpack .../curl_7.81.0-1ubuntu1_amd64.deb ...
Unpacking curl (7.81.0-1ubuntu1) ...
Setting up curl (7.81.0-1ubuntu1) ...
dpkg: error processing package curl (--configure):
 subprocess installed post-installation script returned error exit status 1
Errors were encountered while processing:
 curl
E: Sub-process /usr/bin/dpkg returned an error code (1)
"""
expected = "Setting up curl (7.81.0-1ubuntu1) ...\ndpkg: error processing package curl (--configure):\n subprocess installed post-installation script returned error exit status 1\nErrors were encountered while processing:\n curl\nE: Sub-process /usr/bin/dpkg returned an error code (1)"
