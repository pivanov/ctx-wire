[filters.make]
description = "Compact make output"
match_command = "^make\\b"
strip_lines_matching = [
  # Only the recursive-make NOISE verbs, never the `*** Error` failure line.
  # `^make\[\d+\]:` alone also matches `make[1]: *** [...] Error N`, eating the
  # one line that says the build failed (RE2 has no negative lookahead, so the
  # verbs are enumerated instead).
  "^make\\[\\d+\\]: Entering directory",
  "^make\\[\\d+\\]: Leaving directory",
  "^make\\[\\d+\\]: Nothing to be done",
  "^make\\[\\d+\\]: '.*' is up to date",
  "^\\s*$",
  "^Nothing to be done",
]
max_lines = 50
on_empty = "make: ok"

[[tests.make]]
name = "strips entering/leaving lines"
input = """
make[1]: Entering directory '/home/user'
gcc -O2 foo.c
make[1]: Leaving directory '/home/user'
"""
expected = """
gcc -O2 foo.c
"""

[[tests.make]]
name = "strips blank lines"
input = """
gcc -O2 foo.c

gcc -O2 bar.c
"""
expected = """
gcc -O2 foo.c
gcc -O2 bar.c
"""

[[tests.make]]
name = "on_empty when all stripped"
input = """
make[1]: Entering directory '/home/user'
make[1]: Leaving directory '/home/user'
"""
expected = "make: ok"

[[tests.make]]
name = "recursive failure: *** Error line survives, not eaten as directory noise"
failed = true
input = """
make[1]: Entering directory '/home/user'
make[1]: *** [Makefile:12: test] Error 1
make[1]: Leaving directory '/home/user'
"""
expected = "make[1]: *** [Makefile:12: test] Error 1"
