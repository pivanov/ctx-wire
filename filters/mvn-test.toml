[filters.mvn-test]
description = "Compact Maven test output"
match_command = "^mvn\\s+(test|verify)\\b"
strip_ansi = true
match_output = [
  { pattern = "(?m)(BUILD SUCCESS|Tests run: .*Failures: 0, Errors: 0)", message = "mvn test: ok", unless = "(?i)(BUILD FAILURE|FAILURE!|\\[ERROR\\]|Errors: [1-9])" },
]
strip_lines_matching = [
  "^\\s*$",
  "^\\[INFO\\] ---",
  "^\\[INFO\\] Building\\s",
  "^\\[INFO\\] Downloading\\s",
  "^\\[INFO\\] Downloaded\\s",
  "^Downloading:",
  "^Downloaded:",
]
max_lines = 120

[[tests.mvn-test]]
name = "success collapses"
input = """
[INFO] --- maven-surefire-plugin:test ---
[INFO] Tests run: 12, Failures: 0, Errors: 0, Skipped: 0
[INFO] BUILD SUCCESS
"""
expected = "mvn test: ok"

[[tests.mvn-test]]
name = "failure preserved"
input = """
[ERROR] Failures:
[ERROR]   AppTest.shouldWork:42 expected true
[INFO] BUILD FAILURE
"""
expected = "[ERROR] Failures:\n[ERROR]   AppTest.shouldWork:42 expected true\n[INFO] BUILD FAILURE"

[[tests.mvn-test]]
name = "failed exit: passing module counts and BUILD SUCCESS not collapsed"
failed = true
input = """
[INFO] --- maven-surefire-plugin:test (default-test) @ core ---
[INFO] Tests run: 8, Failures: 0, Errors: 0, Skipped: 0, Time elapsed: 0.42 s
[INFO] Building jar: /repo/core/target/core-1.0.jar
[INFO] BUILD SUCCESS
[INFO] Total time: 5.2 s
"""
expected = "[INFO] Tests run: 8, Failures: 0, Errors: 0, Skipped: 0, Time elapsed: 0.42 s\n[INFO] BUILD SUCCESS\n[INFO] Total time: 5.2 s"
