[filters.git-status]
description = "Compact git status output — remove blank lines and advisory hints"
match_command = "^git\\s+(?:(--no-pager|--paginate|--no-optional-locks|--literal-pathspecs|--no-replace-objects|--bare|-C\\s+\\S+|-c\\s+\\S+|--git-dir(?:=\\S+|\\s+\\S+)|--work-tree(?:=\\S+|\\s+\\S+))\\s+)*status\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^\\s*\\(use \"git ",
  "^nothing added to commit but untracked files present",
  "^no changes added to commit",
]
truncate_lines_at = 140
max_lines = 50

[[tests.git-status]]
name = "strips status hints and blanks"
input = '''
On branch main

No commits yet

Untracked files:
  (use "git add <file>..." to include in what will be committed)
	AGENTS.md
	README.md

nothing added to commit but untracked files present (use "git add" to track)
'''
expected = '''
On branch main
No commits yet
Untracked files:
	AGENTS.md
	README.md
'''

[[tests.git-status]]
name = "short status preserved"
input = "On branch main\nYour branch is up to date with 'origin/main'.\nnothing to commit, working tree clean"
expected = "On branch main\nYour branch is up to date with 'origin/main'.\nnothing to commit, working tree clean"
