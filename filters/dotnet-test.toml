[filters.dotnet-test]
description = "Compact dotnet test output"
match_command = "^dotnet\\s+test\\b"
strip_ansi = true
match_output = [
  { pattern = "(?m)(Passed!|Total tests: .* Passed:)", message = "dotnet test: ok", unless = "(?i)(Failed: [1-9][0-9]*|Error Message|\\berror\\b)" },
]
strip_lines_matching = [
  "^\\s*$",
  "^Microsoft \\(R\\)",
  "^Copyright \\(C\\)",
  "^  Determining projects",
  "^Test run for ",
  "^Starting test execution",
]
max_lines = 100

[[tests.dotnet-test]]
name = "success collapses"
input = """
Test run for /repo/bin/Debug/net8.0/App.Tests.dll (.NETCoreApp,Version=v8.0)
Starting test execution, please wait...
Passed!  - Failed: 0, Passed: 42, Skipped: 0, Total: 42, Duration: 1 s
"""
expected = "dotnet test: ok"

[[tests.dotnet-test]]
name = "failure preserved"
input = """
Failed TestName [12 ms]
Error Message:
 Expected true but was false
"""
expected = "Failed TestName [12 ms]\nError Message:\n Expected true but was false"
