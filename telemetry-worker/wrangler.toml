name = "ctx-wire-telemetry"
main = "src/index.ts"
compatibility_date = "2025-06-01"

[[d1_databases]]
binding = "ctx_wire_telemetry"
database_name = "ctx-wire-telemetry"
database_id = "10035374-0167-442f-8ca8-e1ce3a934312"

# Per-IP rate limit on the write path. This is the meaningful protection for an
# anonymous public endpoint: a token baked into the open-source CLI would be
# trivially extractable and is not real auth, but bounding write volume per IP
# stops a single source from flooding/skewing the aggregate stats. period must be
# 10 or 60 (seconds); tune `limit` if legitimate shared-NAT traffic trips it.
[[unsafe.bindings]]
name = "WRITE_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

# Tighter second limiter for impact reports with outsized savings claims (see
# HEAVY_REPORT_* in src/index.ts), the writes that move the public counters
# disproportionately. Ordinary 30-minute impact flushes never touch it, and
# install events deliberately stay on the ordinary limiter: every
# `ctx-wire init <agent>` sends one unretried install event, so a multi-agent
# init burst must never be dropped. 4/min still covers a shared NAT hosting
# several genuinely heavy workloads.
[[unsafe.bindings]]
name = "HEAVY_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 4, period = 60 }
