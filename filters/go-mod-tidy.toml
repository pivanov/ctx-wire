[filters.go-mod-tidy]
description = "Compact go mod tidy: strip pure download noise but preserve added/upgraded/removed reports and errors"
match_command = "^go\\s+mod\\s+tidy\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^go: downloading ",
  "^go: finding ",
  "^go: extracting ",
]
max_lines = 80
on_empty = "go mod: ok"

[[tests.go-mod-tidy]]
name = "only download noise collapses to ok"
input = '''
go: downloading github.com/foo/bar v1.2.3
go: downloading golang.org/x/sys v0.1.0
'''
expected = "go mod: ok"

[[tests.go-mod-tidy]]
name = "added/upgraded reports preserved"
input = '''
go: downloading github.com/foo/bar v1.2.3
go: added github.com/foo/bar v1.2.3
go: upgraded golang.org/x/sys v0.0.9 => v0.1.0
'''
expected = "go: added github.com/foo/bar v1.2.3\ngo: upgraded golang.org/x/sys v0.0.9 => v0.1.0"

[[tests.go-mod-tidy]]
name = "errors preserved"
input = '''
go: downloading github.com/foo/bar v1.2.3
go: github.com/foo/bar@v1.2.3: missing go.sum entry; to add it: go mod download
'''
expected = "go: github.com/foo/bar@v1.2.3: missing go.sum entry; to add it: go mod download"
