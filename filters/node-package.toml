[filters.node-package]
description = "Compact npm/pnpm/yarn package command output"
match_command = "^(?:(npm|pnpm|yarn)\\s+(install|i|ci|add|build|lint)\\b|npx\\b)"
strip_ansi = true
match_output = [
  { pattern = "(?m)(added \\d+ packages?|Packages:|Done in|audited \\d+ packages|Already up to date)", message = "node package command: ok", unless = "(?i)(ERR!|ERR_PNPM|error|failed|failure|ELIFECYCLE|Command failed)" },
]
strip_lines_matching = [
  "^\\s*$",
  "^npm WARN deprecated",
  "^Progress:",
  "^Resolving:",
  "^Downloading:",
  "^Packages:",
  "^\\s*[+\\-]{3,}",
]
max_lines = 80
on_empty = "node package command: ok"

[[tests.node-package]]
name = "install success collapses"
input = """
Progress: resolved 412, reused 410, downloaded 2, added 142
Packages: +142
+++
added 142 packages, and audited 143 packages in 3s
"""
expected = "node package command: ok"

[[tests.node-package]]
name = "error stays visible"
input = """
npm ERR! code ERESOLVE
npm ERR! ERESOLVE unable to resolve dependency tree
"""
expected = "npm ERR! code ERESOLVE\nnpm ERR! ERESOLVE unable to resolve dependency tree"
