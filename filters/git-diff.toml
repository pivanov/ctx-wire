[filters.git-diff]
description = "Compact git diff/show output: cap large diffs and keep full spool on cap"
match_command = "^git\\s+(?:(--no-pager|-C\\s+\\S+|-c\\s+\\S+)\\s+)*(diff|show|stash\\s+show)\\b"
strip_ansi = true
truncate_lines_at = 240
max_lines = 220

[[tests.git-diff]]
name = "short diff preserved"
input = '''
diff --git a/a.go b/a.go
@@ -1 +1 @@
-old
+new
'''
expected = '''
diff --git a/a.go b/a.go
@@ -1 +1 @@
-old
+new
'''

# git stash show (no -p) prints a diffstat; numbers, file names, and the
# summary line must survive untouched, including binary rows.
[[tests.git-diff]]
name = "stash show stat preserved"
input = '''
 internal/runner/runner.go | 12 ++++++++----
 web/src/App.tsx           |  4 ++--
 assets/logo.png           | Bin 0 -> 10420 bytes
 3 files changed, 10 insertions(+), 6 deletions(-)
'''
expected = '''
 internal/runner/runner.go | 12 ++++++++----
 web/src/App.tsx           |  4 ++--
 assets/logo.png           | Bin 0 -> 10420 bytes
 3 files changed, 10 insertions(+), 6 deletions(-)
'''

# git stash show with no stash entries fails; the error must stay visible and
# never be reshaped into something success-looking.
[[tests.git-diff]]
name = "stash show failure preserved"
failed = true
input = '''
fatal: ambiguous argument 'stash@{0}': unknown revision or path not in the working tree.
'''
expected = '''
fatal: ambiguous argument 'stash@{0}': unknown revision or path not in the working tree.
'''
