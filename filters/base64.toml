[filters.base64]
description = "Pass base64 output through untouched: any truncation makes an encoded stream undecodable, and a single `base64 -w0` line easily exceeds a per-line cap."
match_command = "^base64\\b"
strip_ansi = true

[[tests.base64]]
name = "short encoding preserved"
input = "aGVsbG8gd29ybGQ="
expected = "aGVsbG8gd29ybGQ="

[[tests.base64]]
name = "multi-line decode preserved"
input = "alpha\nbeta\ngamma"
expected = "alpha\nbeta\ngamma"
